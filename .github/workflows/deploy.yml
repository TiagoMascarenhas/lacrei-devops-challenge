name: CI/CD Pipeline - Lacrei Saude

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build-and-test:
    name: Build e Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build da imagem Docker
        run: docker build -t lacrei-api:test .

      - name: Subir container para testes
        run: |
          docker run -d --name lacrei-test -p 3000:3000 lacrei-api:test
          sleep 5

      - name: Testes
        run: npm test

      - name: Derrubar container de teste
        if: always()
        run: |
          docker stop lacrei-test || true
          docker rm lacrei-test || true

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag e push da imagem para o ECR
        env:
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy no EC2 Staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          AWS_REGION_NAME: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: staging-${{ github.sha }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REPO,AWS_REGION_NAME,IMAGE_TAG
          script: |
            TOKEN=$(aws ecr get-login-password --region $AWS_REGION_NAME)
            docker login --username AWS --password $TOKEN $ECR_REPO
            docker pull $ECR_REPO:$IMAGE_TAG
            docker stop lacrei-staging || true
            docker rm lacrei-staging || true
            docker run -d \
              --name lacrei-staging \
              --restart always \
              -p 3000:3000 \
              -e NODE_ENV=staging \
              -e APP_VERSION=$IMAGE_TAG \
              $ECR_REPO:$IMAGE_TAG

      - name: Validar deploy no staging
        run: |
          sleep 15
          curl -f http://${{ secrets.STAGING_HOST }}:3000/status || exit 1

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag e push da imagem para o ECR
        env:
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy no EC2 Production
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          AWS_REGION_NAME: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: prod-${{ github.sha }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REPO,AWS_REGION_NAME,IMAGE_TAG
          script: |
            TOKEN=$(aws ecr get-login-password --region $AWS_REGION_NAME)
            docker login --username AWS --password $TOKEN $ECR_REPO
            docker pull $ECR_REPO:$IMAGE_TAG
            docker stop lacrei-production || true
            docker rm lacrei-production || true
            docker run -d \
              --name lacrei-production \
              --restart always \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e APP_VERSION=$IMAGE_TAG \
              $ECR_REPO:$IMAGE_TAG

      - name: Validar deploy em producao
        run: |
          sleep 15
          curl -f http://${{ secrets.PRODUCTION_HOST }}:3000/status || exit 1
